<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ────────────────────────────────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary meta ────────────────────────────────────────────────────── -->
    <title>ADDU Nation</title>
    <meta name="description" content="ADDU Nation Alumni Portal — connect, donate, and engage with the Ateneo de Davao University community." />
    <meta name="theme-color" content="#040354" />

    <!-- ── Favicon ─────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ── PWA Manifest ────────────────────────────────────────────────────── -->
    <link rel="manifest" href="/firstattempt2026_Manibpel/manifest.json" />

    <!-- ── Apple PWA meta tags ─────────────────────────────────────────────── -->
    <!--
      apple-mobile-web-app-capable: enables standalone mode when added to home screen on iOS
      apple-mobile-web-app-status-bar-style: "black-translucent" overlays the status bar
        on your navy header; use "default" or "black" if you prefer a separate status bar.
    -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ADDU" />

    <!-- Apple touch icon (iOS home screen) — uses your 192px icon as fallback -->
    <link rel="apple-touch-icon" href="/icon-192x192.png" />

    <!-- ── Microsoft / Windows tile ────────────────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#040354" />
    <meta name="msapplication-TileImage" content="/icon-192x192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
